upstream frontend_upstream {
    server frontend:3000 max_fails=3 fail_timeout=10s;
}

upstream backend_upstream {
    server app:8080 max_fails=3 fail_timeout=10s;
}

server {
    listen 80;
    server_name moyeolog.kro.kr;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name moyeolog.kro.kr;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/moyeolog.kro.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/moyeolog.kro.kr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Gzip 압축 설정
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/x-javascript text/javascript application/xml+rss application/atom+xml image/svg+xml;
    gzip_min_length 1024;

    # 보안 헤더 추가 및 Content-Security-Policy 설정
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.kakao.com https://*.daumcdn.net https://cdn.jsdelivr.net; img-src 'self' data: blob: https: http:; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' data: https://cdn.jsdelivr.net; frame-src 'self' https://*.kakao.com; connect-src 'self' https://moyeolog.kro.kr https://*.kakao.com https://cdn.jsdelivr.net;" always;

    client_max_body_size 50M;
    proxy_read_timeout 60s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;

    # Block suspicious Next-Action headers (used by vulnerability scanners, e.g. "x")
    # Next.js Server Action IDs are 40-character hashes.
    if ($http_next_action ~* "^[a-zA-Z0-9]{1,20}$") {
        return 400;
    }

    # Block and silent-drop requests to sensitive files / scanner targets
    location ~* /\.(?!well-known\/) {
        return 404;
        access_log off;
        log_not_found off;
    }

    location ~* \.(env|git|yaml|yml|config|ini|php|sql|bak|swp)$ {
        return 404;
        access_log off;
        log_not_found off;
    }

    # 1. Backend Auth Sync (우선순위 높음)
    location /api/auth/sync {
        proxy_pass http://backend_upstream/api/auth/sync;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. Frontend NextAuth (session, providers 등) 및 프론트엔드 API
    location /api/auth {
        proxy_pass http://frontend_upstream/api/auth;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/search-image {
        proxy_pass http://frontend_upstream/api/search-image;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/proxy-image {
        proxy_pass http://frontend_upstream/api/proxy-image;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Backend API (그 외 모든 /api 요청)
    location /api {
        proxy_pass http://backend_upstream/api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 4. Static uploads (Served directly by Nginx for high performance)
    location /uploads/ {
        alias /var/www/uploads/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # 5. Frontend UI
    location / {
        proxy_pass http://frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
